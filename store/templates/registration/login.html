{% extends 'store/base.html' %}

{% block content %}

<section class="container" style="padding-top: 160px; max-width: 520px;">

    <div class="glass-card">

        <!-- HEADER -->
        <div class="text-center mb-4">

            <h1 class="section-title">
                Login
            </h1>

            <p class="text-light">
                Access your EcoSecure Shop account.
            </p>

        </div>

        <!-- ERROR MESSAGES -->
        {% if messages %}

            {% for message in messages %}
                <div class="alert alert-warning">
                    {{ message }}
                </div>
            {% endfor %}

        {% endif %}

        <!-- LOGIN FORM -->
        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>Email or Username</label>

                <input type="text"
                       name="username"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label>Password</label>

                <input type="password"
                       name="password"
                       class="form-control"
                       required>

            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">

                <label>

                    <input type="checkbox" name="remember_me">

                    Remember me

                </label>

                <!-- FIXED LINK (NO Django url tag) -->
                <a href="/accounts/password_reset/"
                   class="text-success text-decoration-none">

                    Forgot Password?

                </a>

            </div>

            <button type="submit"
                    class="btn btn-glow w-100">

                Login

            </button>

        </form>

        <!-- REGISTER LINK -->
        <div class="text-center mt-4">

            <p class="text-light">

                Don’t have an account?

                <a href="/register/"
                   class="text-success text-decoration-none">

                    Register here

                </a>

            </p>

        </div>

    </div>

</section>

{% endblock %}
