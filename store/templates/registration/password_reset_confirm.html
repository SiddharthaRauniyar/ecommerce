{% extends 'store/base.html' %}

{% block content %}

<section class="container" style="padding-top: 170px; max-width: 550px;">

    <div class="glass-card text-center">

        <!-- ICON -->
        <div class="mb-4">
            <div style="
                width:120px;
                height:120px;
                margin:auto;
                border-radius:50%;
                background:linear-gradient(135deg,#00e676,#7CFFB2);
                display:flex;
                align-items:center;
                justify-content:center;
                font-size:60px;
                box-shadow:0 0 40px rgba(0,230,118,0.4);
            ">
                🔐
            </div>
        </div>

        <h1 class="section-title mb-3">
            Set New Password
        </h1>

        <p class="text-light mb-4">
            Choose a strong password to secure your account.
        </p>

        <!-- FORM -->
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3 text-start">
                <label class="text-light mb-2">New Password</label>
                <input type="password"
                       name="new_password1"
                       class="form-control custom-input"
                       placeholder="Enter new password"
                       required>
            </div>

            <div class="mb-4 text-start">
                <label class="text-light mb-2">Confirm Password</label>
                <input type="password"
                       name="new_password2"
                       class="form-control custom-input"
                       placeholder="Confirm new password"
                       required>
            </div>

            <button type="submit" class="btn btn-glow w-100">
                Reset Password
            </button>

        </form>

    </div>

</section>

<style>
.custom-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px;
    color: #fff;
    transition: 0.3s ease;
}

.custom-input:focus {
    background: rgba(255,255,255,0.08);
    border-color: #00e676;
    box-shadow: 0 0 10px rgba(0,230,118,0.3);
    color: #fff;
}

.custom-input::placeholder {
    color: rgba(255,255,255,0.5);
}
</style>

{% endblock %}
