{% extends "store/base.html" %}

{% block content %}

<section class="container" style="padding-top:150px; max-width:600px;">

    <div class="glass-card text-center">

        <!-- ICON -->
        <div class="mb-4">
            <div style="
                width:120px;
                height:120px;
                margin:auto;
                border-radius:50%;
                background:linear-gradient(135deg,#00e676,#7CFFB2);
                display:flex;
                align-items:center;
                justify-content:center;
                font-size:60px;
                box-shadow:0 0 40px rgba(0,230,118,0.4);
            ">
                📩
            </div>
        </div>

        <h1 class="section-title">
            Check Your Email
        </h1>

        <p class="text-light mt-3">
            We’ve sent a password reset link to your email address.
        </p>

        <p class="text-light" style="opacity:0.7;">
            If you don’t see it, check your spam folder.
        </p>

    </div>

</section>

{% endblock %}
