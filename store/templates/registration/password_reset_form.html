{% extends 'store/base.html' %}

{% block content %}

<section class="container"
         style="padding-top: 170px; max-width: 650px; min-height: 90vh;">

    <div class="glass-card">

        <!-- HEADER -->
        <div class="text-center mb-5">

            <div style="
                width:120px;
                height:120px;
                margin:auto;
                border-radius:50%;
                background:linear-gradient(135deg,#00e676,#7CFFB2);
                display:flex;
                align-items:center;
                justify-content:center;
                font-size:60px;
                box-shadow:0 0 40px rgba(0,230,118,0.4);
            ">
                🔑
            </div>

            <h1 class="section-title mt-4">
                Reset Password
            </h1>

            <p class="text-light fs-5">
                Enter your email address and we will send
                password reset instructions.
            </p>

        </div>

        <!-- FORM -->
        <form method="POST">

            {% csrf_token %}

            <div class="mb-4">

                <label>Email Address</label>

                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="johndoe@email.com"
                       required>

            </div>

            <button type="submit" class="btn btn-glow w-100">
                Send Reset Link
            </button>

        </form>

        <!-- BACK -->
        <div class="text-center mt-4">

            <a href="/login/" class="text-success text-decoration-none">
                ← Back to Login
            </a>

        </div>

    </div>

</section>

{% endblock %}
