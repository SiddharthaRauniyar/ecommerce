{% extends 'store/base.html' %}

{% block content %}

<section class="container" style="padding-top: 170px; min-height: 90vh;">

    <div class="glass-card text-center">

        <h1 style="
            font-size: 180px;
            font-weight: 900;
            background: linear-gradient(90deg,#00e676,#7CFFB2,#D4FF00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        ">
            404
        </h1>

        <h2 class="section-title mb-4">
            Page Not Found
        </h2>

        <p class="text-light fs-5" style="max-width: 700px; margin:auto;">
            The page you are looking for may have been removed,
            renamed, or is temporarily unavailable.
        </p>

        <div class="my-5" style="font-size: 120px;">
            🌍
        </div>

        <div class="d-flex justify-content-center gap-4 flex-wrap">

            <a href="/" class="btn btn-glow">
                Return Home
            </a>

            <a href="/products/" class="btn btn-outline-glow">
                Browse Products
            </a>

        </div>

    </div>

</section>

{% endblock %}
